version: 1

project:
  name: ml-face-recognition
  task: face-metric-learning
  experiment: triplet-hardmining
  notes: "Triplet loss with batch-hard mining and PK sampling."

output:
  root_dir: experiments/runs
  run_name: auto
  naming:
    use_timestamp: true
    include_experiment: true
  dirs:
    logs: logs
    checkpoints: checkpoints
    metrics: metrics
    artifacts: artifacts
  save_resolved_config: true

system:
  seed: 42
  deterministic: false
  benchmark: true
  device: auto
  num_workers: 8
  pin_memory: true
  amp: true

data:
  dataset_name: casia-webface
  root_dir: data/casia-webface
  split_file: data/splits/casia_identity_split_v1.json
  auto_download: false
  download_source: kaggle
  dataset_ref: debarghamitraroy/casia-webface
  image_size: 224
  channels: 3
  debug_subset:
    enabled: false
    max_identities: null
    max_images_per_identity: null

model:
  backbone: resnet18
  pretrained: true
  embedding_dim: 128
  normalize_embeddings: true
  classifier_head:
    enabled: false
    num_classes: null

loss:
  name: triplet
  params:
    mining_margin: 0.2
    normalize_embeddings: true
    mining_curriculum: # easy_semi_hard, semi_hard, hard
      phase1: easy_semi_hard
      phase2: semi_hard
      phase3: hard
      phase1_epochs: 5
      phase2_epochs: 40 # + phase1_epochs

train:
  epochs: 100
  batch_size: 512
  eval_every: 5
  log_every_steps: 100
  sampler:
    p: 24
    k: 4
    shuffle: true
    drop_last: true
  optimizer:
    name: adamw
    lr: 0.0003
    weight_decay: 0.01
  scheduler:
    name: cosine
    params:
      t_max: 100
      min_lr: 0.000001
  grad_clip:
    enabled: true
    max_norm: 5.0

retrieval_eval:
  enabled: true
  distance: cosine
  l2_normalize: true
  topk: [1, 5, 10]
  batch_size: 128

logging:
  level: INFO
  tensorboard:
    enabled: true
    subdir: tb
  json_metrics: true

checkpoint:
  resume_from: null
  save_last: true
  save_best: true
  save_every_n_epochs: 5
  monitor: val_map_at_5
  mode: max